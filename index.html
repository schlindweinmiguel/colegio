<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colégio Estadual São Cristóvão • Capanema - PR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="tail-container bg-zinc-950 text-white">

  <!-- NAVBAR -->
  <nav class="bg-[#003087] border-b border-emerald-500 shadow-xl fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-3xl font-bold text-[#003087]">CSC</div>
        <div>
          <h1 class="text-2xl font-bold tracking-tighter">Colégio Estadual</h1>
          <p class="text-emerald-400 text-sm -mt-1">São Cristóvão</p>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="#inicio" onclick="navigateTo('inicio')" class="nav-link text-white hover:text-emerald-400">INÍCIO</a>
        <a href="#historia" onclick="navigateTo('historia')" class="nav-link text-white hover:text-emerald-400">HISTÓRIA</a>
        <a href="#reclamacoes" onclick="navigateTo('reclamacoes')" class="nav-link text-white hover:text-emerald-400">RECLAMAÇÕES</a>
        <a href="#loja" onclick="navigateTo('loja')" class="nav-link text-white hover:text-emerald-400">LOJA DO COLÉGIO</a>
      </div>
      <div class="flex items-center gap-4" id="auth-buttons">
        <!-- JS preenche aqui -->
      </div>
    </div>
  </nav>
  <div class="pt-20"></div>

  <!-- Todo o conteúdo do body (hero, sections, modais, etc.) vai aqui -->
  <!-- Copie todo o conteúdo entre <body> e </body> do seu código original (exceto a <script> final) -->

  <!-- CHATBOT -->
  <div onclick="toggleChat()" class="fixed bottom-8 right-8 bg-emerald-500 w-16 h-16 rounded-3xl flex items-center justify-center text-3xl shadow-2xl chatbot cursor-pointer z-[999]">
    <i class="fas fa-robot"></i>
  </div>
  <div id="chat-window" class="hidden fixed bottom-28 right-8 bg-zinc-900 w-96 rounded-3xl shadow-2xl overflow-hidden z-[999]">
    <div class="bg-emerald-600 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-robot text-2xl"></i>
        <div>
          <p class="font-bold">Bot do CSC</p>
          <p class="text-xs">Assistente virtual</p>
        </div>
      </div>
      <button onclick="toggleChat()" class="text-2xl">×</button>
    </div>
    <div id="chat-messages" class="h-96 overflow-y-auto p-6 space-y-4 bg-zinc-950"></div>
    <div class="p-4 border-t border-zinc-700 flex">
      <input id="chat-input" type="text" placeholder="Digite aqui..." class="flex-1 bg-zinc-800 rounded-l-2xl px-6 py-4 focus:outline-none">
      <button onclick="enviarMensagemChat()" class="bg-emerald-500 px-8 rounded-r-2xl">→</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
